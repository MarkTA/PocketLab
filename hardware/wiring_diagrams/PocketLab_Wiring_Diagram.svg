<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1450" viewBox="0 0 1800 1450">
  <style>
    .title{font:700 34px Arial}.subtitle{font:600 23px Arial}.label{font:18px Arial}.small{font:15px Arial}.pin{font:16px Consolas,monospace}.note{font:17px Arial}.box{fill:#f8fafc;stroke:#172554;stroke-width:3}.module{fill:#e0f2fe;stroke:#075985;stroke-width:4}.chip{fill:#f3f4f6;stroke:#111827;stroke-width:4}.wire{fill:none;stroke-width:4}.signal{stroke:#2563eb}.power33{stroke:#dc2626}.power5{stroke:#ea580c}.ground{stroke:#111827}.analog{stroke:#16a34a}.vref{stroke:#7c3aed}.node{fill:#fff;stroke:#111827;stroke-width:3}.res{fill:#fff;stroke:#111827;stroke-width:3}.muted{fill:#6b7280}.warn{fill:#b91c1c;font:600 17px Arial}.net{font:600 16px Arial;paint-order:stroke;stroke:#fff;stroke-width:5px;stroke-linejoin:round}
  </style>

  <rect width="1800" height="1450" fill="white"/>
  <text x="900" y="52" text-anchor="middle" class="title">PocketLab Function Generator — Physical Wiring Reference</text>
  <text x="900" y="86" text-anchor="middle" class="note">Module faces and OP484 are shown from the TOP / component side</text>

  <!-- NODEMCU -->
  <rect x="70" y="145" width="430" height="570" rx="24" class="module"/>
  <text x="285" y="185" text-anchor="middle" class="subtitle">NodeMCU-32S — TOP VIEW</text>
  <rect x="200" y="240" width="170" height="285" rx="12" fill="#374151"/>
  <text x="285" y="385" text-anchor="middle" fill="white" class="subtitle">ESP32</text>
  <rect x="235" y="660" width="100" height="35" rx="6" fill="#94a3b8" stroke="#334155" stroke-width="3"/>
  <text x="285" y="742" text-anchor="middle" class="small">USB connector at bottom</text>

  <!-- NodeMCU relevant physical pins -->
  <circle cx="70" cy="220" r="8" class="node"/><text x="92" y="226" class="pin">3V3</text>
  <circle cx="70" cy="665" r="8" class="node"/><text x="92" y="671" class="pin">5V</text>
  <circle cx="500" cy="220" r="8" class="node"/><text x="480" y="226" text-anchor="end" class="pin">GND</text>
  <circle cx="500" cy="250" r="8" class="node"/><text x="480" y="256" text-anchor="end" class="pin">GPIO23</text>
  <circle cx="500" cy="430" r="8" class="node"/><text x="480" y="436" text-anchor="end" class="pin">GPIO18</text>
  <circle cx="500" cy="460" r="8" class="node"/><text x="480" y="466" text-anchor="end" class="pin">GPIO5</text>
  <circle cx="500" cy="370" r="8" class="node"/><text x="480" y="376" text-anchor="end" class="pin">GND</text>
  <text x="285" y="575" text-anchor="middle" class="small muted">Other GPIO pins omitted for clarity</text>

  <!-- AD9833 -->
  <rect x="1260" y="160" width="440" height="535" rx="18" class="module"/>
  <text x="1480" y="200" text-anchor="middle" class="subtitle">AD9833 MODULE</text>
  <text x="1480" y="230" text-anchor="middle" class="note">FRONT / COMPONENT VIEW</text>
  <text x="1480" y="260" text-anchor="middle" class="small">Pin order reversed from supplied backside image</text>
  <rect x="1420" y="305" width="190" height="260" rx="10" fill="#0284c7" stroke="#075985" stroke-width="3"/>
  <text x="1515" y="440" text-anchor="middle" fill="white" class="subtitle">DDS</text>

  <!-- AD pins, top to bottom front view -->
  <circle cx="1260" cy="295" r="8" class="node"/><text x="1280" y="301" class="pin">OUT</text>
  <circle cx="1260" cy="350" r="8" class="node"/><text x="1280" y="356" class="pin">AGND</text>
  <circle cx="1260" cy="405" r="8" class="node"/><text x="1280" y="411" class="pin">FSYNC</text>
  <circle cx="1260" cy="460" r="8" class="node"/><text x="1280" y="466" class="pin">SCLK</text>
  <circle cx="1260" cy="515" r="8" class="node"/><text x="1280" y="521" class="pin">SDATA</text>
  <circle cx="1260" cy="570" r="8" class="node"/><text x="1280" y="576" class="pin">DGND</text>
  <circle cx="1260" cy="625" r="8" class="node"/><text x="1280" y="631" class="pin">VCC</text>

  <!-- Digital module wiring, routed in separate lanes -->
  <path d="M500 460 H700 V405 H1260" class="wire signal"/><text x="800" y="396" class="net" fill="#2563eb">GPIO 5 → FSYNC</text>
  <path d="M500 430 H730 V460 H1260" class="wire signal"/><text x="820" y="451" class="net" fill="#2563eb">GPIO 18 → SCLK</text>
  <path d="M500 250 H760 V515 H1260" class="wire signal"/><text x="850" y="506" class="net" fill="#2563eb">GPIO 23 → SDATA</text>
  <path d="M70 220 H35 V110 H1190 V625 H1260" class="wire power33"/><text x="650" y="130" class="net" fill="#dc2626">3V3 → VCC</text>
  <path d="M500 220 H800 V570 H1260" class="wire ground"/><text x="875" y="561" class="net">GND → DGND</text>
  <path d="M500 370 H830 V350 H1260" class="wire ground"/><text x="900" y="341" class="net">GND → AGND</text>

  <!-- divider between panels -->
  <line x1="50" y1="790" x2="1750" y2="790" stroke="#94a3b8" stroke-width="2"/>
  <text x="900" y="835" text-anchor="middle" class="title">OP484 DIP-14 Analog Wiring — TOP VIEW</text>

  <!-- OP484 DIP -->
  <rect x="735" y="900" width="360" height="440" rx="20" class="chip"/>
  <path d="M865 900 Q915 955 965 900" fill="white" stroke="#111827" stroke-width="4"/>
  <text x="915" y="1075" text-anchor="middle" class="subtitle">OP484</text>
  <text x="915" y="1105" text-anchor="middle" class="note">DIP-14 TOP VIEW</text>
  <text x="915" y="1150" text-anchor="middle" class="small">A: gain stage</text>
  <text x="915" y="1175" text-anchor="middle" class="small">B: VREF buffer</text>
  <text x="915" y="1210" text-anchor="middle" class="small muted">C and D unused</text>

  <!-- DIP pins left 1-7 -->
  <g class="pin">
    <line x1="690" y1="955" x2="735" y2="955" stroke="#111827" stroke-width="4"/><text x="725" y="947" text-anchor="end">1 OUT A</text>
    <line x1="690" y1="1010" x2="735" y2="1010" stroke="#111827" stroke-width="4"/><text x="725" y="1002" text-anchor="end">2 −IN A</text>
    <line x1="690" y1="1065" x2="735" y2="1065" stroke="#111827" stroke-width="4"/><text x="725" y="1057" text-anchor="end">3 +IN A</text>
    <line x1="690" y1="1120" x2="735" y2="1120" stroke="#111827" stroke-width="4"/><text x="725" y="1112" text-anchor="end">4 V+</text>
    <line x1="690" y1="1175" x2="735" y2="1175" stroke="#111827" stroke-width="4"/><text x="725" y="1167" text-anchor="end">5 +IN B</text>
    <line x1="690" y1="1230" x2="735" y2="1230" stroke="#111827" stroke-width="4"/><text x="725" y="1222" text-anchor="end">6 −IN B</text>
    <line x1="690" y1="1285" x2="735" y2="1285" stroke="#111827" stroke-width="4"/><text x="725" y="1277" text-anchor="end">7 OUT B</text>
    <line x1="1095" y1="955" x2="1140" y2="955" stroke="#111827" stroke-width="4"/><text x="1105" y="947">14 OUT D</text>
    <line x1="1095" y1="1010" x2="1140" y2="1010" stroke="#111827" stroke-width="4"/><text x="1105" y="1002">13 −IN D</text>
    <line x1="1095" y1="1065" x2="1140" y2="1065" stroke="#111827" stroke-width="4"/><text x="1105" y="1057">12 +IN D</text>
    <line x1="1095" y1="1120" x2="1140" y2="1120" stroke="#111827" stroke-width="4"/><text x="1105" y="1112">11 V−</text>
    <line x1="1095" y1="1175" x2="1140" y2="1175" stroke="#111827" stroke-width="4"/><text x="1105" y="1167">10 +IN C</text>
    <line x1="1095" y1="1230" x2="1140" y2="1230" stroke="#111827" stroke-width="4"/><text x="1105" y="1222">9 −IN C</text>
    <line x1="1095" y1="1285" x2="1140" y2="1285" stroke="#111827" stroke-width="4"/><text x="1105" y="1277">8 OUT C</text>
  </g>

  <!-- AD OUT to coupling cap to pin 3 -->
  <path d="M1260 295 H1210 V860 H155 V1065 H260" class="wire analog"/>
  <text x="175" y="1045" class="net" fill="#16a34a">AD9833 OUT</text>
  <line x1="260" y1="1035" x2="260" y2="1095" stroke="#111827" stroke-width="5"/>
  <line x1="280" y1="1035" x2="280" y2="1095" stroke="#111827" stroke-width="5"/>
  <path d="M280 1065 H690" class="wire analog"/>
  <text x="250" y="1125" class="label">C1 1 µF</text>
  <circle cx="390" cy="1065" r="7" class="node"/><text x="400" y="1050" class="small">TP1</text>

  <!-- 5V and ground -->
  <path d="M70 665 H25 V1120 H690" class="wire power5"/><text x="135" y="1110" class="net" fill="#ea580c">NodeMCU 5V → pin 4</text>
  <path d="M1140 1120 H1510" class="wire ground"/><text x="1260" y="1110" class="net">pin 11 → GND</text>
  <path d="M500 220 H535 V1375 H1510" class="wire ground"/>
  <text x="1325" y="1365" class="net">COMMON GROUND</text>

  <!-- VREF divider -->
  <rect x="390" y="1160" width="70" height="35" class="res"/><text x="425" y="1150" text-anchor="middle" class="small">10 kΩ</text>
  <path d="M425 1160 V1120" class="wire power5"/>
  <path d="M425 1195 V1175 H690" class="wire vref"/><circle cx="520" cy="1175" r="7" class="node"/>
  <rect x="390" y="1235" width="70" height="35" class="res"/><text x="425" y="1300" text-anchor="middle" class="small">10 kΩ</text>
  <path d="M425 1195 V1235 M425 1270 V1375" class="wire ground"/>
  <text x="465" y="1205" class="net" fill="#7c3aed">RAW VREF → pin 5</text>

  <!-- channel B follower pin6-pin7, buffered VREF -->
  <path d="M690 1230 H620 V1285 H690" class="wire vref"/>
  <path d="M620 1285 H335" class="wire vref"/><circle cx="335" cy="1285" r="7" class="node"/>
  <text x="150" y="1315" class="net" fill="#7c3aed">BUFFERED VREF (pin 7 / TP3)</text>

  <!-- Rbias from TP1 to buffered VREF -->
  <path d="M390 1065 V1185" class="wire vref"/>
  <rect x="355" y="1185" width="70" height="35" class="res"/><text x="345" y="1210" text-anchor="end" class="small">Rbias 10 kΩ</text>
  <path d="M390 1220 V1285" class="wire vref"/>

  <!-- gain feedback Rf pin1-pin2 -->
  <path d="M690 955 H500 V882 H520" class="wire analog"/><circle cx="555" cy="955" r="7" class="node"/><text x="470" y="945" class="small">TP2 / VOUT</text>
  <rect x="520" y="865" width="140" height="35" class="res"/><text x="590" y="855" text-anchor="middle" class="small">Rf 62.0 kΩ</text>
  <path d="M660 882 H675 V1010 H690" class="wire analog"/>
  <!-- Rg pin2 to buffered VREF -->
  <path d="M675 1010 V1140" class="wire vref"/>
  <rect x="640" y="1140" width="70" height="35" class="res"/><text x="725" y="1165" class="small">Rg 10.19 kΩ</text>
  <path d="M675 1175 V1285 H620" class="wire vref"/>

  <!-- decoupling note -->
  <rect x="1280" y="1190" width="390" height="125" rx="10" class="box"/>
  <text x="1305" y="1225" class="subtitle">Supply decoupling</text>
  <text x="1305" y="1260" class="label">100 nF ceramic: pin 4 ↔ pin 11</text>
  <text x="1305" y="1292" class="label">Optional 10 µF: 5 V ↔ GND</text>

  <text x="900" y="1415" text-anchor="middle" class="warn">Before powering: verify Rf = 62.0 kΩ from pin 1 to pin 2, Rg = 10.19 kΩ from pin 2 to pin 7, and pin 4-to-pin 11 is not shorted.</text>
</svg>
